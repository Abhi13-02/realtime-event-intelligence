[alembic]
# Path to the alembic directory containing env.py and versions/
script_location = alembic

# sqlalchemy.url is intentionally left blank here — it is set programmatically
# in alembic/env.py by reading the DATABASE_URL from your .env file and
# converting the asyncpg driver to psycopg2 (Alembic requires a sync driver).
sqlalchemy.url =

# Template for generated migration filenames.
# %(year)d%(month).2d%(day).2d_%(rev)s_%(slug)s.py  →  e.g. 20260330_001_initial_schema.py
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Alembic locks the DB while running a migration. This is the timeout in seconds.
# 10 seconds is fine for dev.
lock_timeout = 10

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
