# Internal reverse proxy for deployment: one public entrypoint routes the
# Next.js app and the FastAPI /v1 API (including the WebSocket) so a single
# tunnel/port serves everything.

server {
    listen 80;
    server_name _;

    client_max_body_size 10m;

    # FastAPI — REST + WebSocket
    location /v1/ {
        proxy_pass http://backend:8000/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        # WebSocket upgrade (used by /v1/ws)
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Next.js app (pages + its own /api routes)
    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }
}
